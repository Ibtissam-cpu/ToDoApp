<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>TaskFlow</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Plus+Jakarta+Sans:wght@600;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg:        #f5f4f1;
    --surface:   #ffffff;
    --surface2:  #faf9f7;
    --border:    #e8e5df;
    --border2:   #d4d0c8;
    --text:      #1c1a17;
    --text2:     #6b6659;
    --muted:     #9e998e;
    --accent:    #2563eb;
    --accent-bg: #eff4ff;
    --high:      #dc2626;
    --high-bg:   #fef2f2;
    --medium:    #d97706;
    --medium-bg: #fffbeb;
    --low:       #059669;
    --low-bg:    #f0fdf4;
    --done-bg:   #f9f9f8;
    --radius:    8px;
    --shadow:    0 1px 3px rgba(0,0,0,.06), 0 1px 2px rgba(0,0,0,.04);
    --shadow-md: 0 4px 12px rgba(0,0,0,.08), 0 2px 4px rgba(0,0,0,.04);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 48px 20px 80px;
  }

  /* ── Header ─────────────────────────────────── */
  .header {
    width: 100%; max-width: 680px;
    display: flex; align-items: center;
    justify-content: space-between;
    margin-bottom: 32px;
  }
  .logo {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 1.35rem; font-weight: 700;
    color: var(--text); letter-spacing: -0.02em;
  }
  .logo span { color: var(--accent); }

  /* ── Stats ───────────────────────────────────── */
  .stats {
    display: flex; gap: 20px; align-items: center;
  }
  .stat {
    text-align: right;
  }
  .stat-num {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 1rem; font-weight: 700; color: var(--text);
    line-height: 1;
  }
  .stat-label {
    font-size: 0.68rem; color: var(--muted);
    text-transform: uppercase; letter-spacing: 0.05em;
    margin-top: 2px;
  }
  .stat-divider { width: 1px; height: 28px; background: var(--border); }

  .progress-wrap {
    display: flex; align-items: center; gap: 8px;
  }
  .progress-bar-outer {
    width: 80px; height: 5px;
    background: var(--border);
    border-radius: 99px; overflow: hidden;
  }
  .progress-bar-inner {
    height: 100%; background: var(--accent);
    border-radius: 99px;
    transition: width .5s ease;
    width: 0%;
  }
  .progress-pct {
    font-size: 0.72rem; font-weight: 600;
    color: var(--accent); min-width: 28px;
  }

  /* ── Add task ────────────────────────────────── */
  .add-card {
    width: 100%; max-width: 680px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    box-shadow: var(--shadow);
    padding: 16px;
    margin-bottom: 12px;
    display: flex; gap: 10px; align-items: center;
  }
  .add-card:focus-within {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(37,99,235,.08), var(--shadow);
  }
  .add-icon {
    width: 22px; height: 22px; flex-shrink: 0;
    border: 1.5px solid var(--border2); border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    color: var(--muted); font-size: 14px; font-weight: 300;
    transition: all .15s;
  }
  .add-card:focus-within .add-icon {
    border-color: var(--accent); color: var(--accent);
  }
  .add-card input {
    flex: 1; border: none; outline: none;
    background: none; font-family: 'Inter', sans-serif;
    font-size: 0.9rem; color: var(--text);
  }
  .add-card input::placeholder { color: var(--muted); }
  .pri-select {
    border: 1px solid var(--border);
    border-radius: 6px; background: var(--surface2);
    color: var(--text2); font-family: 'Inter', sans-serif;
    font-size: 0.78rem; padding: 5px 8px;
    cursor: pointer; outline: none;
    transition: border-color .15s;
  }
  .pri-select:focus { border-color: var(--accent); }
  .add-btn {
    background: var(--accent); color: #fff;
    border: none; border-radius: 6px;
    font-family: 'Inter', sans-serif; font-weight: 600;
    font-size: 0.83rem; padding: 7px 18px;
    cursor: pointer; transition: background .15s;
    white-space: nowrap;
  }
  .add-btn:hover { background: #1d4ed8; }

  /* ── Toolbar ─────────────────────────────────── */
  .toolbar {
    width: 100%; max-width: 680px;
    display: flex; gap: 8px; flex-wrap: wrap;
    margin-bottom: 16px; align-items: center;
  }
  .filter-group { display: flex; background: var(--surface);
    border: 1px solid var(--border); border-radius: 7px;
    overflow: hidden; box-shadow: var(--shadow);
  }
  .filter-btn {
    background: none; border: none; border-right: 1px solid var(--border);
    color: var(--text2); font-family: 'Inter', sans-serif;
    font-size: 0.75rem; font-weight: 500;
    padding: 6px 13px; cursor: pointer; transition: all .12s;
    white-space: nowrap;
  }
  .filter-btn:last-child { border-right: none; }
  .filter-btn:hover { background: var(--bg); color: var(--text); }
  .filter-btn.active {
    background: var(--accent); color: #fff;
  }
  .toolbar .spacer { flex: 1; }
  .bulk-btn {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 6px; color: var(--text2);
    font-family: 'Inter', sans-serif; font-size: 0.73rem; font-weight: 500;
    padding: 6px 12px; cursor: pointer; transition: all .12s;
    box-shadow: var(--shadow);
    white-space: nowrap;
  }
  .bulk-btn:hover { border-color: var(--border2); color: var(--text); background: var(--surface2); }

  /* ── Sort bar ────────────────────────────────── */
  .sort-bar {
    width: 100%; max-width: 680px;
    display: flex; gap: 6px; align-items: center;
    margin-bottom: 12px;
  }
  .sort-label {
    font-size: 0.72rem; color: var(--muted);
    font-weight: 500; text-transform: uppercase;
    letter-spacing: 0.05em; margin-right: 2px;
  }

  /* ── Task list ───────────────────────────────── */
  .task-list {
    width: 100%; max-width: 680px;
    display: flex; flex-direction: column; gap: 4px;
  }

  .task {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    display: flex; align-items: center; gap: 12px;
    padding: 13px 14px;
    transition: box-shadow .15s, border-color .15s, opacity .25s;
    animation: fadeUp .18s ease;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .task:hover { box-shadow: var(--shadow-md); border-color: var(--border2); }
  .task.done { background: var(--done-bg); opacity: .65; }

  /* Checkbox */
  .task-check {
    width: 18px; height: 18px; flex-shrink: 0;
    border: 1.5px solid var(--border2);
    border-radius: 5px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all .15s; background: var(--surface);
  }
  .task-check:hover { border-color: var(--accent); background: var(--accent-bg); }
  .task.done .task-check {
    background: var(--accent); border-color: var(--accent);
  }
  .task.done .task-check::after {
    content: '';
    width: 9px; height: 5px;
    border-left: 2px solid #fff;
    border-bottom: 2px solid #fff;
    transform: rotate(-45deg) translateY(-1px);
    display: block;
  }

  /* Priority badge */
  .pri-badge {
    font-size: 0.65rem; font-weight: 600;
    padding: 2px 7px; border-radius: 4px;
    letter-spacing: 0.03em; flex-shrink: 0;
    text-transform: uppercase;
  }
  .pri-badge.high   { background: var(--high-bg);   color: var(--high); }
  .pri-badge.medium { background: var(--medium-bg); color: var(--medium); }
  .pri-badge.low    { background: var(--low-bg);    color: var(--low); }

  /* Inline priority edit */
  .pri-inline {
    border: 1px solid var(--border); border-radius: 5px;
    background: var(--surface2); color: var(--text2);
    font-family: 'Inter', sans-serif; font-size: 0.73rem;
    padding: 2px 5px; cursor: pointer; outline: none;
    display: none;
  }

  /* Title */
  .task-title {
    flex: 1; font-size: 0.88rem; font-weight: 500;
    color: var(--text); line-height: 1.4;
  }
  .task.done .task-title {
    text-decoration: line-through; color: var(--muted);
  }
  .task-title[contenteditable="true"] {
    outline: none;
    border-bottom: 1.5px solid var(--accent);
    padding-bottom: 1px;
  }

  /* Date */
  .task-date {
    font-size: 0.68rem; color: var(--muted);
    white-space: nowrap; flex-shrink: 0;
  }

  /* Actions */
  .task-actions {
    display: flex; gap: 4px;
    opacity: 0; transition: opacity .12s;
  }
  .task:hover .task-actions { opacity: 1; }

  .action-btn {
    background: none; border: 1px solid var(--border);
    border-radius: 5px; color: var(--muted);
    font-family: 'Inter', sans-serif; font-size: 0.72rem;
    font-weight: 500; padding: 3px 9px; cursor: pointer;
    transition: all .12s;
  }
  .action-btn.edit:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-bg); }
  .action-btn.save { border-color: var(--accent); color: var(--accent); background: var(--accent-bg); display: none; }
  .action-btn.del:hover { border-color: var(--high); color: var(--high); background: var(--high-bg); }

  /* ── Empty state ─────────────────────────────── */
  .empty {
    text-align: center; padding: 64px 20px;
    color: var(--muted); display: none;
  }
  .empty-icon {
    width: 48px; height: 48px; border-radius: 12px;
    background: var(--surface); border: 1px solid var(--border);
    box-shadow: var(--shadow);
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 14px; font-size: 20px;
  }
  .empty p { font-size: 0.85rem; }

  /* ── Toast ───────────────────────────────────── */
  .toast {
    position: fixed; bottom: 24px; left: 50%;
    transform: translateX(-50%);
    background: var(--text); color: #fff;
    border-radius: 8px; padding: 10px 18px;
    font-size: 0.8rem; font-weight: 500;
    opacity: 0; transition: opacity .25s;
    pointer-events: none; white-space: nowrap;
    box-shadow: var(--shadow-md);
  }
  .toast.error { background: var(--high); }
  .toast.show  { opacity: 1; }
</style>
</head>
<body>

<!-- Header -->
<header class="header">
  <div class="logo">Task<span>Flow</span></div>
  <div class="stats">
    <div class="stat">
      <div class="stat-num" id="s-active">0</div>
      <div class="stat-label">Active</div>
    </div>
    <div class="stat-divider"></div>
    <div class="stat">
      <div class="stat-num" id="s-done">0</div>
      <div class="stat-label">Done</div>
    </div>
    <div class="stat-divider"></div>
    <div class="progress-wrap">
      <div class="progress-bar-outer">
        <div class="progress-bar-inner" id="prog-bar"></div>
      </div>
      <div class="progress-pct" id="prog-pct">0%</div>
    </div>
  </div>
</header>

<!-- Add task -->
<div class="add-card">
  <div class="add-icon">+</div>
  <input type="text" id="new-title" placeholder="Add a new task…" maxlength="200" />
  <select class="pri-select" id="new-pri">
    <option value="medium">Medium</option>
    <option value="high">High</option>
    <option value="low">Low</option>
  </select>
  <button class="add-btn" onclick="addTask()">Add task</button>
</div>

<!-- Toolbar -->
<div class="toolbar">
  <div class="filter-group" id="status-filters">
    <button class="filter-btn active" onclick="setFilter('status','all',this)">All</button>
    <button class="filter-btn"        onclick="setFilter('status','active',this)">Active</button>
    <button class="filter-btn"        onclick="setFilter('status','done',this)">Done</button>
  </div>
  <div class="filter-group" id="pri-filters">
    <button class="filter-btn active" onclick="setFilter('priority','all',this)">All priority</button>
    <button class="filter-btn"        onclick="setFilter('priority','high',this)">High</button>
    <button class="filter-btn"        onclick="setFilter('priority','medium',this)">Medium</button>
    <button class="filter-btn"        onclick="setFilter('priority','low',this)">Low</button>
  </div>
  <div class="spacer"></div>
  <button class="bulk-btn" onclick="bulkAction('complete_all')">Complete all</button>
  <button class="bulk-btn" onclick="bulkAction('clear_done')">Clear done</button>
</div>

<!-- Sort -->
<div class="sort-bar">
  <span class="sort-label">Sort</span>
  <div class="filter-group">
    <button class="filter-btn active" onclick="setSort('created',this)">Newest</button>
    <button class="filter-btn"        onclick="setSort('priority',this)">Priority</button>
    <button class="filter-btn"        onclick="setSort('title',this)">A – Z</button>
  </div>
</div>

<!-- List -->
<div class="task-list" id="task-list"></div>
<div class="empty" id="empty">
  <div class="empty-icon">✓</div>
  <p>No tasks here. Add one above to get started.</p>
</div>

<div class="toast" id="toast"></div>

<script>
  const state = { status: 'all', priority: 'all', sort: 'created' };

  async function api(path, opts = {}) {
    const r = await fetch(path, { headers: { 'Content-Type': 'application/json' }, ...opts });
    if (!r.ok) { const e = await r.json().catch(() => ({})); throw new Error(e.error || r.statusText); }
    if (r.status === 204) return null;
    return r.json();
  }

  async function load() {
    const p = new URLSearchParams({ status: state.status, priority: state.priority, sort: state.sort });
    const tasks = await api(`/api/tasks?${p}`);
    renderTasks(tasks);
    loadStats();
  }

  async function loadStats() {
    const s = await api('/api/stats');
    document.getElementById('s-active').textContent = s.active;
    document.getElementById('s-done').textContent   = s.done;
    document.getElementById('prog-pct').textContent = s.percent + '%';
    document.getElementById('prog-bar').style.width = s.percent + '%';
  }

  function renderTasks(tasks) {
    const list = document.getElementById('task-list');
    const empty = document.getElementById('empty');
    list.innerHTML = '';
    if (!tasks.length) { empty.style.display = 'block'; return; }
    empty.style.display = 'none';
    tasks.forEach(t => list.appendChild(makeTaskEl(t)));
  }

  function makeTaskEl(t) {
    const el = document.createElement('div');
    el.className = 'task' + (t.done ? ' done' : '');
    el.dataset.id = t.id;
    const date = new Date(t.created_at).toLocaleDateString('en-GB', { day:'numeric', month:'short' });
    el.innerHTML = `
      <div class="task-check" onclick="toggleDone(${t.id}, ${t.done ? 0 : 1})"></div>
      <span class="pri-badge ${t.priority}" id="badge-${t.id}">${t.priority}</span>
      <select class="pri-inline" id="pri-${t.id}" onchange="savePri(${t.id})">
        <option value="high"   ${t.priority==='high'   ?'selected':''}>High</option>
        <option value="medium" ${t.priority==='medium' ?'selected':''}>Medium</option>
        <option value="low"    ${t.priority==='low'    ?'selected':''}>Low</option>
      </select>
      <div class="task-title" id="title-${t.id}">${esc(t.title)}</div>
      <div class="task-date">${date}</div>
      <div class="task-actions">
        <button class="action-btn edit" onclick="startEdit(${t.id})">Edit</button>
        <button class="action-btn save" id="save-${t.id}" onclick="saveEdit(${t.id})">Save</button>
        <button class="action-btn del"  onclick="deleteTask(${t.id})">Delete</button>
      </div>`;
    return el;
  }

  function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  async function addTask() {
    const inp = document.getElementById('new-title');
    const title = inp.value.trim();
    if (!title) { toast('Title cannot be empty', true); return; }
    const priority = document.getElementById('new-pri').value;
    await api('/api/tasks', { method: 'POST', body: JSON.stringify({ title, priority }) });
    inp.value = '';
    load();
    toast('Task added');
  }

  async function toggleDone(id, val) {
    await api(`/api/tasks/${id}`, { method: 'PATCH', body: JSON.stringify({ done: val }) });
    load();
  }

  function startEdit(id) {
    const titleEl = document.getElementById(`title-${id}`);
    const saveBtn = document.getElementById(`save-${id}`);
    const priSel  = document.getElementById(`pri-${id}`);
    const badge   = document.getElementById(`badge-${id}`);
    titleEl.contentEditable = 'true';
    titleEl.focus();
    saveBtn.style.display = 'inline-block';
    priSel.style.display  = 'inline-block';
    badge.style.display   = 'none';
    const range = document.createRange();
    range.selectNodeContents(titleEl);
    window.getSelection().removeAllRanges();
    window.getSelection().addRange(range);
  }

  async function saveEdit(id) {
    const titleEl = document.getElementById(`title-${id}`);
    const priSel  = document.getElementById(`pri-${id}`);
    const title   = titleEl.textContent.trim();
    if (!title) { toast('Title cannot be empty', true); return; }
    await api(`/api/tasks/${id}`, { method: 'PATCH', body: JSON.stringify({ title, priority: priSel.value }) });
    load();
    toast('Saved');
  }

  async function savePri(id) {
    const priSel = document.getElementById(`pri-${id}`);
    await api(`/api/tasks/${id}`, { method: 'PATCH', body: JSON.stringify({ priority: priSel.value }) });
    load();
  }

  async function deleteTask(id) {
    await api(`/api/tasks/${id}`, { method: 'DELETE' });
    load();
    toast('Task deleted');
  }

  async function bulkAction(action) {
    await api('/api/tasks/bulk', { method: 'PATCH', body: JSON.stringify({ action }) });
    load();
    toast(action === 'complete_all' ? 'All tasks completed' : 'Done tasks cleared');
  }

  function setFilter(type, val, btn) {
    state[type] = val;
    const group = type === 'status' ? 'status-filters' : 'pri-filters';
    document.querySelectorAll(`#${group} .filter-btn`).forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    load();
  }

  function setSort(val, btn) {
    state.sort = val;
    document.querySelectorAll('.sort-bar .filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    load();
  }

  let toastTimer;
  function toast(msg, err = false) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.className = 'toast show' + (err ? ' error' : '');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => el.classList.remove('show'), 2200);
  }

  document.getElementById('new-title').addEventListener('keydown', e => {
    if (e.key === 'Enter') addTask();
  });

  load();
</script>
</body>
</html>
